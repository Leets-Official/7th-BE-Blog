spring:
  application:
    name: leets-project
  h2:
    console:
      enabled: true
    datasource:
      url: jdbc:h2:file:./data/mydb;DB_CLOSE_ON_EXIT=FALSE
      driver-class-name: org.h2.Driver
      username: sa
      password:
    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true